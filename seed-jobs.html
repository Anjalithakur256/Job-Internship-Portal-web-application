        async function seedJobs() {
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('seedBtn');
            const user = auth.currentUser;
            if (!user) { statusEl.innerHTML = '<span class="err">✗ Not logged in. Please log in first.</span>'; return; }

            btn.disabled = true;
            btn.textContent = 'Seeding…';
            statusEl.innerHTML = `Starting seed for ${demoJobs.length} jobs…<br>`;

            let success = 0, failed = 0;

            for (const job of demoJobs) {
                try {
                    await db.collection('jobs').add({
                        ...job,
                        recruiterId: user.uid,
                        recruiterEmail: user.email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    success++;
                    statusEl.innerHTML += `<span style="color:#10b981;">✓</span> ${job.title} @ ${job.company}<br>`;
                    statusEl.scrollTop = statusEl.scrollHeight;
                } catch (err) {
                    failed++;
                    statusEl.innerHTML += `<span class="err">✗ ${job.title} — ${err.message}</span><br>`;
                }
            }

            statusEl.innerHTML += `<br><span class="${failed === 0 ? 'done' : 'err'}">${success} added successfully${failed > 0 ? `, ${failed} failed` : ''}. 🎉</span>`;
            btn.textContent = 'Done!';
            btn.style.background = '#10b981';
        }
