<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#e53935">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JobNexus">
    <link rel="apple-touch-icon" href="/Public/icons/icon-192.svg">
    <title>Login - JobNexus Portal</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/light-theme.css">
    <link rel="stylesheet" href="css/page-animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23e53935'/><text x='50' y='60' font-size='50' font-weight='bold' fill='white' text-anchor='middle'>J</text></svg>">
    <style>
      *,
      *:after,
      *:before {
        box-sizing: border-box;
      }

      :root {
        --cord: hsl(210, 0%, calc((40 + (var(--on, 0) * 50)) * 1%));
        --opening: hsl(
          50,
          calc((10 + (var(--on, 0) * 80)) * 1%),
          calc((20 + (var(--on, 0) * 70)) * 1%)
        );
        --feature: #0a0a0a;
        --accent: 210;
        --tongue: #e06952;
        --base-top: hsl(
          var(--accent),
          0%,
          calc((40 + (var(--on, 0) * 40)) * 1%)
        );
        --base-side: hsl(
          var(--accent),
          0%,
          calc((20 + (var(--on, 0) * 40)) * 1%)
        );
        --post: hsl(
          var(--accent),
          0%,
          calc((20 + (var(--on, 0) * 40)) * 1%)
        );
        --b-1: hsla(
          45,
          calc((0 + (var(--on, 0) * 0)) * 1%),
          calc((50 + (var(--on, 0) * 50)) * 1%),
          0.85
        );
        --b-2: hsla(
          45,
          calc((0 + (var(--on, 0) * 0)) * 1%),
          calc((20 + (var(--on, 0) * 30)) * 1%),
          0.25
        );
        --b-3: hsla(
          45,
          calc((0 + (var(--on, 0) * 0)) * 1%),
          calc((20 + (var(--on, 0) * 30)) * 1%),
          0.5
        );
        --b-4: hsla(
          45,
          calc((0 + (var(--on, 0) * 0)) * 1%),
          calc((20 + (var(--on, 0) * 30)) * 1%),
          0.25
        );
        --l-1: hsla(
          45,
          calc((0 + (var(--on, 0) * 20)) * 1%),
          calc((50 + (var(--on, 0) * 50)) * 1%),
          0.85
        );
        --l-2: hsla(
          45,
          calc((0 + (var(--on, 0) * 20)) * 1%),
          calc((50 + (var(--on, 0) * 50)) * 1%),
          0.85
        );
        --shade-hue: 260;
        --t-1: hsl(
          var(--shade-hue),
          calc((0 + (var(--on, 0) * 20)) * 1%),
          calc((30 + (var(--on, 0) * 60)) * 1%)
        );
        --t-2: hsl(
          var(--shade-hue),
          calc((0 + (var(--on, 0) * 20)) * 1%),
          calc((20 + (var(--on, 0) * 35)) * 1%)
        );
        --t-3: hsl(
          var(--shade-hue),
          calc((0 + (var(--on, 0) * 20)) * 1%),
          calc((10 + (var(--on, 0) * 20)) * 1%)
        );
        --glow-color: #e53935;
        --glow-color-dark: hsl(3, 70%, 45%);
      }

      body {
        background: #0f0f1f;
        color: #fff;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      .lamp-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 5vw;
        position: relative;
      }

      .lamp-page::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(circle at 50% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
        pointer-events: none;
      }

      .lamp-stage {
        width: min(1200px, 100%);
        background: rgba(18, 25, 33, 0.6);
        backdrop-filter: blur(20px);
        border-radius: 28px;
        padding: 3rem 2rem;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 1px rgba(255, 255, 255, 0.1) inset;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8vmin;
        flex-wrap: wrap;
        padding: 1rem 0;
      }

      .login-form {
        background: rgba(18, 25, 33, 0.9);
        padding: 3rem 2.5rem;
        border-radius: 20px;
        min-width: 320px;
        max-width: 440px;
        width: 100%;
        opacity: 0;
        transform: scale(0.8) translateY(20px);
        pointer-events: none;
        transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        border: 2px solid transparent;
        box-shadow: 0 0 0px rgba(255, 255, 255, 0);
        display: block;
      }

      .login-form.active {
        opacity: 1;
        transform: scale(1) translateY(0);
        pointer-events: all;
        border-color: var(--glow-color);
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.1),
          0 0 30px var(--glow-color),
          inset 0 0 15px rgba(255, 255, 255, 0.05);
      }

      .login-form h2 {
        color: #fff;
        font-size: 2rem;
        margin: 0 0 2rem 0;
        text-align: center;
        text-shadow: 0 0 8px var(--glow-color);
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        color: #aaa;
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
        text-shadow: 0 0 5px var(--glow-color);
      }

      .form-group input {
        width: 100%;
        padding: 0.75rem 1rem;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #fff;
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--glow-color);
        box-shadow: 0 0 10px var(--glow-color);
        background: rgba(255, 255, 255, 0.08);
      }

      .form-group input::placeholder {
        color: #666;
      }

      .login-btn {
        width: 100%;
        padding: 0.875rem;
        background: linear-gradient(
          135deg,
          var(--glow-color),
          var(--glow-color-dark)
        );
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        margin-top: 0.5rem;
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3),
          0 0 20px var(--glow-color);
      }

      .login-btn:active {
        transform: translateY(0);
      }

      .form-footer {
        margin-top: 1.5rem;
        text-align: center;
      }

      .forgot-link {
        color: #888;
        font-size: 0.9rem;
        text-decoration: none;
        transition: all 0.3s ease;
      }

      .forgot-link:hover {
        color: var(--glow-color);
        text-shadow: 0 0 10px var(--glow-color);
      }

      .auth-tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }

      .tab {
        flex: 1;
        padding: 0.75rem;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #888;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .tab.active {
        background: rgba(255, 255, 255, 0.1);
        border-color: var(--glow-color);
        color: #fff;
        text-shadow: 0 0 5px var(--glow-color);
      }

      .tab:hover:not(.active) {
        background: rgba(255, 255, 255, 0.08);
      }

      .hidden {
        display: none !important;
      }

      .auth-message {
        margin-bottom: 1rem;
        padding: 0.75rem;
        border-radius: 8px;
        font-size: 0.9rem;
        text-align: center;
        color: #fff;
        background: rgba(255, 255, 255, 0.05);
        min-height: 1.5rem;
      }

      .auth-message:empty {
        display: none;
      }

      .auth-message.success {
        background: rgba(52, 168, 83, 0.2);
        border: 1px solid #34a853;
        color: #34a853;
      }

      .auth-message.error {
        background: rgba(234, 67, 53, 0.2);
        border: 1px solid #ea4335;
        color: #ea4335;
      }

      /* Form animations */
      form {
        animation: fadeSlideIn 0.4s ease;
      }

      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Password toggle */
      .password-wrapper {
        position: relative;
      }

      .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #666;
        cursor: pointer;
        padding: 4px;
        transition: color 0.3s ease;
      }

      .password-toggle:hover {
        color: var(--glow-color);
      }

      .password-wrapper input {
        padding-right: 40px;
      }

      /* Loading state */
      .login-btn.loading {
        pointer-events: none;
        opacity: 0.7;
      }

      .login-btn.loading::after {
        content: '';
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid transparent;
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-left: 8px;
        vertical-align: middle;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Password strength indicator */
      .password-strength {
        height: 4px;
        border-radius: 2px;
        margin-top: 8px;
        background: rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }

      .password-strength-bar {
        height: 100%;
        width: 0;
        transition: width 0.3s ease, background 0.3s ease;
        border-radius: 2px;
      }

      .password-strength-bar.weak { width: 33%; background: #ea4335; }
      .password-strength-bar.medium { width: 66%; background: #fbbc05; }
      .password-strength-bar.strong { width: 100%; background: #34a853; }

      .password-hint {
        font-size: 0.75rem;
        color: #666;
        margin-top: 4px;
      }

      .divider {
        display: flex;
        align-items: center;
        margin: 1.5rem 0;
        color: #666;
        font-size: 0.85rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
      }

      .divider span {
        padding: 0 1rem;
      }

      .google-btn {
        width: 100%;
        padding: 0.875rem;
        background: #fff;
        border: none;
        border-radius: 10px;
        color: #333;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
      }

      .google-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
      }

      .google-btn.loading {
        pointer-events: none;
        opacity: 0.7;
      }

      .google-btn svg {
        width: 20px;
        height: 20px;
      }

      .radio-controls {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;
      }

      .lamp {
        display: block;
        height: 40vmin;
        max-height: 400px;
        overflow: visible !important;
      }

      .cord {
        stroke: var(--cord);
      }

      .cord--rig {
        display: none;
      }

      .lamp__tongue {
        fill: var(--tongue);
      }

      .lamp__hit {
        cursor: pointer;
        opacity: 0;
      }

      .lamp__feature {
        fill: var(--feature);
      }

      .lamp__stroke {
        stroke: var(--feature);
      }

      .lamp__mouth,
      .lamp__light {
        opacity: var(--on, 0);
      }

      .lamp__eye {
        transform-origin: 50% 50%;
      }

      .shade__opening {
        fill: var(--opening);
      }

      .shade__opening-shade {
        opacity: calc(1 - var(--on, 0));
      }

      .post__body {
        fill: var(--post);
      }

      .base__top {
        fill: var(--base-top);
      }

      .base__side {
        fill: var(--base-side);
      }

      .top__body {
        fill: var(--t-3);
      }

      .back-link {
        position: absolute;
        top: 2rem;
        left: 2rem;
        color: #888;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.3s ease;
        font-size: 0.95rem;
      }

      .back-link:hover {
        color: var(--glow-color);
      }

      .back-link i {
        transition: transform 0.3s ease;
      }

      .back-link:hover i {
        transform: translateX(-4px);
      }

      .hint-text {
        position: absolute;
        bottom: 3rem;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.9rem;
        text-align: center;
        animation: pulse 2s ease-in-out infinite;
        pointer-events: none;
      }

      .hint-text i {
        display: block;
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
        animation: bounce 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }

      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      .hint-text.hidden {
        display: none;
      }

      @media (max-width: 900px) {
        .lamp-page {
          min-height: auto;
          padding: 2rem 4vw;
        }

        .lamp-stage {
          padding: 2rem 1.5rem;
        }

        .container {
          gap: 6vmin;
        }

        .login-form {
          min-width: 0;
          width: min(420px, 100%);
        }

        .lamp {
          max-height: 300px;
        }
      }

      @media (max-width: 600px) {
        .lamp-stage {
          padding: 1.5rem 1.2rem;
        }

        .login-form {
          padding: 2rem 1.5rem;
        }

        .login-form h2 {
          font-size: 1.6rem;
        }

        .container {
          flex-direction: column;
        }

        .lamp {
          max-height: 250px;
        }

        .back-link {
          top: 1rem;
          left: 1rem;
        }
      }
    </style>
</head>

    <script>
      // Interactive lamp animation with draggable string (no MorphSVGPlugin needed)
      const ON = document.querySelector("#on");
      const OFF = document.querySelector("#off");
      const LOGIN_FORM = document.querySelector(".login-form");
      const HINT_TEXT = document.querySelector("#hintText");

      let startX;
      let startY;
      let hasInteracted = false;

      const PROXY = document.createElement("div");

      const HIT = document.querySelector(".lamp__hit");
      const DUMMY_CORD = document.querySelector(".cord--dummy");
      const ENDX = parseFloat(DUMMY_CORD.getAttribute("x2"));
      const ENDY = parseFloat(DUMMY_CORD.getAttribute("y2"));
      const STARTX = parseFloat(DUMMY_CORD.getAttribute("x1"));
      const STARTY = parseFloat(DUMMY_CORD.getAttribute("y1"));

      const RESET = () => {
        gsap.set(PROXY, { x: ENDX, y: ENDY });
      };
      RESET();

      const STATE = { ON: false };

      // Initial setup
      gsap.set([".cords", HIT], { x: -10 });
      gsap.set(".lamp__eye", {
        rotate: 180,
        transformOrigin: "50% 50%",
        yPercent: 50,
      });

      // Hide the morphing cord paths — we only use the dummy cord line
      gsap.utils.toArray(".cord--rig").forEach(c => gsap.set(c, { display: "none" }));

      // Toggle lamp state
      function toggleLamp() {
        STATE.ON = !STATE.ON;
        gsap.set(document.documentElement, { "--on": STATE.ON ? 1 : 0 });

        // Hide hint text after first interaction
        if (!hasInteracted && HINT_TEXT) {
          HINT_TEXT.classList.add("hidden");
          hasInteracted = true;
        }

        // Random color for lamp shade when turned on
        const hue = gsap.utils.random(0, 359);
        gsap.set(document.documentElement, { "--shade-hue": hue });
        const glowColor = `hsl(${hue}, 70%, 55%)`;
        const glowColorDark = `hsl(${hue}, 70%, 45%)`;
        gsap.set(document.documentElement, { "--glow-color": glowColor });
        gsap.set(document.documentElement, { "--glow-color-dark": glowColorDark });

        // Animate lamp eyes
        gsap.set(".lamp__eye", { rotate: STATE.ON ? 0 : 180 });

        // Show/hide login form
        if (STATE.ON) {
          ON.setAttribute("checked", true);
          OFF.removeAttribute("checked");
          LOGIN_FORM.classList.add("active");
        } else {
          ON.removeAttribute("checked");
          OFF.setAttribute("checked", true);
          LOGIN_FORM.classList.remove("active");
        }
      }

      // Cord bounce animation (spring back effect — no MorphSVG needed)
      function playCordBounce() {
        // Disable interaction during animation
        gsap.set(HIT, { pointerEvents: "none" });

        toggleLamp();

        // Animate the dummy cord with a spring-like bounce
        const tl = gsap.timeline({
          onComplete: () => {
            gsap.set(HIT, { pointerEvents: "auto" });
            RESET();
          },
        });

        tl.to(DUMMY_CORD, {
          attr: { x2: ENDX + 15, y2: ENDY + 40 },
          duration: 0.1,
          ease: "power2.out",
        })
        .to(DUMMY_CORD, {
          attr: { x2: ENDX - 10, y2: ENDY + 25 },
          duration: 0.08,
          ease: "power1.inOut",
        })
        .to(DUMMY_CORD, {
          attr: { x2: ENDX + 6, y2: ENDY + 15 },
          duration: 0.08,
          ease: "power1.inOut",
        })
        .to(DUMMY_CORD, {
          attr: { x2: ENDX - 3, y2: ENDY + 8 },
          duration: 0.07,
          ease: "power1.inOut",
        })
        .to(DUMMY_CORD, {
          attr: { x2: ENDX, y2: ENDY },
          duration: 0.12,
          ease: "elastic.out(1, 0.4)",
        });
      }

      // Make the cord draggable
      Draggable.create(PROXY, {
        trigger: HIT,
        type: "x,y",
        onPress: (e) => {
          startX = e.x;
          startY = e.y;
        },
        onDrag: function () {
          gsap.set(DUMMY_CORD, {
            attr: {
              x2: this.x,
              y2: Math.max(ENDY, this.y),
            },
          });
        },
        onRelease: function (e) {
          const DISTX = Math.abs(e.x - startX);
          const DISTY = Math.abs(e.y - startY);
          const TRAVELLED = Math.sqrt(DISTX * DISTX + DISTY * DISTY);

          if (TRAVELLED > 50) {
            // Snap cord back then trigger toggle
            gsap.to(DUMMY_CORD, {
              attr: { x2: ENDX, y2: ENDY },
              duration: 0.1,
              onComplete: () => playCordBounce(),
            });
          } else {
            // Not far enough, just snap back
            gsap.to(DUMMY_CORD, {
              attr: { x2: ENDX, y2: ENDY },
              duration: 0.15,
              ease: "power2.out",
            });
          }
        },
      });

      // Also allow clicking the lamp hit area to toggle
      HIT.addEventListener("click", (e) => {
        // Only trigger on click if not dragging
        if (!startX && !startY) {
          playCordBounce();
        }
        startX = null;
        startY = null;
      });

      // Show lamp
      gsap.set(".lamp", { display: "block" });
    </script>
    <script src="js/page-animations.js"></script>
    <script src="/js/pwa.js"></script>
